<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Personal Portfolio">
<meta name="keywords" content="Portfolio, HTML5">
<meta name="author" content="Shreya Sharma">

<title>My Portfolio</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Shreya Sharma</h1>

    <nav aria-label="Main Navigation">
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<main>

<section id="about">
    <h2>About Me</h2>
    <p>
        I am a frontend developer passionate about building
        responsive websites.
    </p>
</section>

<section id="skills">
    <h2>Skills</h2>

    <article>
        <p>HTML5</p>
        <p>CSS3</p>
        <p>JavaScript</p>
        <p>jQuery</p>
    </article>
</section>

<section id="contact">
    <h2>Contact Me</h2>

    <form aria-label="Contact Form">

        <label for="name">Name</label>
        <input
            type="text"
            id="name"
            aria-label="Name"
            required>

        <label for="email">Email</label>
        <input
            type="email"
            id="email"
            aria-label="Email"
            required>

        <label for="message">Message</label>
        <textarea
            id="message"
            aria-label="Message"
            required>
        </textarea>

        <button type="submit">
            Submit
        </button>

    </form>
</section>

</main>

<footer>
    <p>© 2026 Shreya Sharma</p>
</footer>

</body>
</html>
